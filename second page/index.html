<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The ONLY1 Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<section class="hero">

    <div class="overlay"></div>

    <!-- SCREEN 1: Hero Content -->
    <div class="screen screen-1 active">
        <div class="content">
            <h1>The <span>ONLY1</span><br>Dashboard</h1>
            <p>
                The ONLY1 dashboard for all small and medium businesses
                to increase store traffic, increase sales, and rank
                in AEO, GEO and AI Search.
            </p>
            <button class="btn-sweep" id="swipeBtn">
                Explore Options
                <span class="arrow">→</span>
            </button>
        </div>
    </div>

    <!-- SCREEN 2: Two Circles -->
    <div class="screen screen-2">
        <div class="circles-wrapper">

            <div class="circles-row">
                <div class="circle-card">
                    <h2>YOUR WAY</h2>
                    <p class="highlight">YOU SET<br>PARAMETERS</p>
                </div>

                <div class="circle-card">
                    <h2>The <span class="num">1</span> WAY</h2>
                    <p class="highlight">FULLY<br>AUTOMATED</p>
                </div>
            </div>

            <button class="btn-back" id="backBtn">
                ← Go Back
            </button>

        </div>
    </div>

</section>

<script>
    const swipeBtn = document.getElementById('swipeBtn');
    const backBtn  = document.getElementById('backBtn');
    const screen1  = document.querySelector('.screen-1');
    const screen2  = document.querySelector('.screen-2');

    swipeBtn.addEventListener('click', () => {
        screen1.classList.remove('active');
        screen1.classList.add('slide-out-left');
        screen2.classList.add('active');
        screen2.classList.add('slide-in-right');
    });

    backBtn.addEventListener('click', () => {
        screen2.classList.remove('active');
        screen2.classList.remove('slide-in-right');
        screen1.classList.remove('slide-out-left');
        screen1.classList.add('active');
    });
</script>

</body>
</html>
